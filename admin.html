<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Admin - Adept Cinema</title>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-lg mx-auto bg-gray-800 p-8 rounded-xl">
        <h2 class="text-2xl font-bold mb-6 text-red-500">Add New Movie</h2>
        <div class="space-y-4">
            <input id="title" placeholder="Movie Title" class="w-full p-3 bg-gray-700 rounded outline-none">
            <input id="poster" placeholder="Poster URL" class="w-full p-3 bg-gray-700 rounded outline-none">
            <input id="category" placeholder="Category (e.g. Action)" class="w-full p-3 bg-gray-700 rounded outline-none">
            <input id="link" placeholder="Watch Link (YouTube/Drive)" class="w-full p-3 bg-gray-700 rounded outline-none">
            <button id="addBtn" class="w-full bg-red-600 py-3 rounded font-bold">SAVE TO FIREBASE</button>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('addBtn').onclick = async () => {
            const title = document.getElementById('title').value;
            const poster = document.getElementById('poster').value;
            const category = document.getElementById('category').value;
            const link = document.getElementById('link').value;

            try {
                await addDoc(collection(db, "movies"), {
                    title, poster, category, link, timestamp: new Date()
                });
                alert("Movie Added!");
                location.reload();
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
